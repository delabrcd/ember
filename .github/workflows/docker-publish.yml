name: Build and publish image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve app version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"            # release tag vX.Y.Z -> X.Y.Z
          else
            v="0.0.0-edge.${GITHUB_SHA::7}"     # main / dev build (valid semver prerelease)
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$v"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ngrid-dashboard
          # Releases (git tag vX.Y.Z) publish X.Y.Z, X.Y, X and move :latest.
          # Pushes to main publish :edge only. Every build also gets a :sha-xxxxxxx tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest tracks the newest stable RELEASE only — never a main/edge build.
            # Applied only on a non-prerelease vX.Y.Z tag (excludes vX.Y.Z-rc1 etc.).
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=edge,branch=main
            type=sha,format=short
          # Disable the implicit auto-latest; we control :latest explicitly above.
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
